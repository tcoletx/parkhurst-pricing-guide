<svg xmlns="http://www.w3.org/2000/svg" width="220" height="48" viewBox="0 0 220 48">
  <defs>
    <linearGradient id="logo-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#e0c48a"/>
    </linearGradient>
  </defs>

  <!-- Eye / lens icon mark -->
  <g transform="translate(4, 6)">
    <!-- Outer lens shape -->
    <path d="M 18 18 C 10 10 2 18 2 18 C 2 18 10 26 18 18 Z" fill="none" stroke="url(#logo-gold)" stroke-width="1.5" opacity="0.9"/>
    <path d="M 18 18 C 26 10 34 18 34 18 C 34 18 26 26 18 18 Z" fill="none" stroke="url(#logo-gold)" stroke-width="1.5" opacity="0.9"/>

    <!-- Iris ring -->
    <circle cx="18" cy="18" r="6" fill="none" stroke="url(#logo-gold)" stroke-width="1.5" opacity="0.85"/>

    <!-- Pupil -->
    <circle cx="18" cy="18" r="2.5" fill="url(#logo-gold)" opacity="0.8"/>

    <!-- Highlight -->
    <circle cx="20" cy="16" r="1" fill="white" opacity="0.5"/>
  </g>

  <!-- Wordmark: PARKHURST -->
  <text
    x="48" y="20"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2.5"
    fill="#f0ede8"
  >PARKHURST</text>

  <!-- Wordmark: NuVision -->
  <text
    x="48" y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-style="italic"
    font-weight="400"
    letter-spacing="1"
    fill="#c9a96e"
  >NuVision</text>

  <!-- Fine separator line -->
  <line x1="48" y1="24" x2="215" y2="24" stroke="rgba(201,169,110,0.2)" stroke-width="0.5"/>
</svg>
