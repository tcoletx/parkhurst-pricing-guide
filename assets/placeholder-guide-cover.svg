<svg xmlns="http://www.w3.org/2000/svg" width="340" height="440" viewBox="0 0 340 440">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1126"/>
      <stop offset="100%" stop-color="#07091a"/>
    </linearGradient>

    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#e0c48a"/>
    </linearGradient>

    <!-- Cover border gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c9a96e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Orb glow -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>

    <!-- Fine grid pattern -->
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>

    <clipPath id="rounded">
      <rect width="340" height="440" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="340" height="440" rx="16" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="340" height="440" rx="16" fill="url(#grid)" clip-path="url(#rounded)"/>

  <!-- Ambient orbs -->
  <ellipse cx="260" cy="80" rx="160" ry="140" fill="url(#orb1)"/>
  <ellipse cx="80" cy="360" rx="120" ry="100" fill="url(#orb2)"/>

  <!-- Border -->
  <rect x="1" y="1" width="338" height="438" rx="15" fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>

  <!-- Top gold accent line -->
  <rect x="0" y="0" width="340" height="3" rx="2" fill="url(#gold)"/>

  <!-- Eye icon — abstract optical motif -->
  <g transform="translate(170, 100)" fill="none">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="40" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="28" stroke="url(#gold)" stroke-width="0.5" opacity="0.2"/>

    <!-- Eye outline -->
    <path d="M -34 0 C -20 -18 20 -18 34 0 C 20 18 -20 18 -34 0 Z"
          stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.85"/>

    <!-- Iris -->
    <circle cx="0" cy="0" r="10" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.9"/>

    <!-- Pupil -->
    <circle cx="0" cy="0" r="4" fill="url(#gold)" opacity="0.7"/>

    <!-- Highlight -->
    <circle cx="3" cy="-3" r="1.5" fill="white" opacity="0.6"/>

    <!-- Radial detail lines -->
    <line x1="0" y1="-44" x2="0" y2="-36" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="36" x2="0" y2="44" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
    <line x1="-44" y1="0" x2="-36" y2="0" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
    <line x1="36" y1="0" x2="44" y2="0" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Tagline above title -->
  <text x="170" y="183" font-family="DM Sans, sans-serif" font-size="8" font-weight="500"
        fill="#c9a96e" text-anchor="middle" letter-spacing="3" opacity="0.9">
    PARKHURST NUVISION
  </text>

  <!-- Horizontal rule -->
  <line x1="100" y1="193" x2="240" y2="193" stroke="#c9a96e" stroke-width="0.5" opacity="0.35"/>

  <!-- Main title -->
  <text x="170" y="230" font-family="Georgia, serif" font-size="26" font-weight="400"
        fill="#f0ede8" text-anchor="middle" letter-spacing="-0.5">
    LASIK Pricing
  </text>
  <text x="170" y="258" font-family="Georgia, serif" font-size="26" font-weight="400" font-style="italic"
        fill="#c9a96e" text-anchor="middle" letter-spacing="-0.5">
    Guide
  </text>

  <!-- Subtitle -->
  <text x="170" y="285" font-family="DM Sans, sans-serif" font-size="9.5" font-weight="300"
        fill="rgba(240,237,232,0.55)" text-anchor="middle" letter-spacing="0.5">
    Real Numbers. No Surprises.
  </text>

  <!-- Divider -->
  <line x1="120" y1="305" x2="220" y2="305" stroke="rgba(201,169,110,0.2)" stroke-width="0.5"/>

  <!-- Inside section labels -->
  <g font-family="DM Sans, sans-serif" font-size="8.5" fill="rgba(240,237,232,0.45)" font-weight="300" letter-spacing="0.3">
    <text x="76" y="325" text-anchor="start">✓ Procedure-by-procedure breakdown</text>
    <text x="76" y="342" text-anchor="start">✓ Financing options decoded</text>
    <text x="76" y="359" text-anchor="start">✓ 10-year cost comparison</text>
    <text x="76" y="376" text-anchor="start">✓ What's included in our fee</text>
    <text x="76" y="393" text-anchor="start">✓ Next steps &amp; booking guide</text>
  </g>

  <!-- Bottom gold bar -->
  <rect x="0" y="416" width="340" height="24" rx="0" fill="url(#gold)" opacity="0.06"/>
  <rect x="0" y="437" width="340" height="3" rx="2" fill="url(#gold)" opacity="0.4"/>

  <!-- Bottom text -->
  <text x="170" y="430" font-family="DM Sans, sans-serif" font-size="7.5" font-weight="400"
        fill="rgba(201,169,110,0.6)" text-anchor="middle" letter-spacing="2">
    FREE DOWNLOAD · SANANTONIO-LASIK.COM
  </text>
</svg>
